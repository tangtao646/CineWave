name: Android Build

on:
  workflow_dispatch:
  workflow_call:

env:
  GRADLE_OPTS: "-Xmx4096M -Dorg.gradle.daemon=false"

jobs:
  android-build:
    name: Build Android App (Release Only)
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject secrets from GitHub Secrets
        run: |
          echo "🔐 Decoding DB_JSON secret into composeResources/files/db.json..."
          echo "${{ secrets.DB_JSON }}" | base64 -d > shared/src/commonMain/composeResources/files/db.json
          echo "✅ db.json injected successfully ($(wc -c < shared/src/commonMain/composeResources/files/db.json) bytes)"
          echo "🔐 Injecting TMDB_API_KEY into composeResources/files/tmdb_api_key.txt..."
          echo "${{ secrets.TMDB_API_KEY }}" > shared/src/commonMain/composeResources/files/tmdb_api_key.txt
          echo "✅ tmdb_api_key.txt injected successfully ($(wc -c < shared/src/commonMain/composeResources/files/tmdb_api_key.txt) bytes)"

      # 【签名】从 GitHub Secrets 还原 keystore 文件
      - name: Restore Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android_app_keystore.jks
          echo "✅ Keystore restored successfully ($(wc -c < android_app_keystore.jks) bytes)"

      # 【修复】将 JDK 11 升级至现代 KMP / Android 必备的 JDK 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      # 【优化】打出真正用于分发的 Release 版 APK，日志控制依然生效
      - name: Build Android APK (Release)
        run: |
          ./gradlew :androidApp:assembleRelease \
            -PlogEnabled=false \
            -PandroidKeystoreFile=android_app_keystore.jks \
            -PandroidKeystorePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -PandroidKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -PandroidKeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }} \
            --no-daemon

      - name: Build Android AAB (Release)
        run: |
          ./gradlew :androidApp:bundleRelease \
            -PlogEnabled=false \
            -PandroidKeystoreFile=android_app_keystore.jks \
            -PandroidKeystorePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -PandroidKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -PandroidKeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }} \
            --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: androidApp/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-release
          path: androidApp/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "CineWave v${{ github.run_number }}"
          body: |
            ## CineWave Android App
            
            - 构建详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - 代码提交: ${{ github.sha }}
          # 【修复】只将真正的 release 产物对外公开暴露
          files: |
            androidApp/build/outputs/apk/release/*.apk
            androidApp/build/outputs/bundle/release/*.aab
          generate_release_notes: true
          make_latest: true

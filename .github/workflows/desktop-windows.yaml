name: Desktop Build (Windows)

on:
  workflow_dispatch:
  workflow_call:

env:
  GRADLE_OPTS: "-Xmx4096M -Dorg.gradle.daemon=false"

jobs:
  desktop-build-windows:
    name: Build Desktop App (Windows)
    runs-on: windows-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Build Desktop App (Windows MSI)
        run: |
          ./gradlew :desktopApp:packageMsi --no-daemon
        shell: bash

      - name: Upload Desktop MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-msi
          path: desktopApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "CineWave v${{ github.run_number }}"
          body: |
            ## CineWave Desktop App (Windows)
            
            - 构建详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - 代码提交: ${{ github.sha }}
          files: desktopApp/build/compose/binaries/main/msi/*.msi
          generate_release_notes: true
          make_latest: true

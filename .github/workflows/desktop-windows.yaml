name: Desktop Build (Windows)

on:
  workflow_dispatch:
  workflow_call:

env:
  GRADLE_OPTS: "-Xmx4096M -Dorg.gradle.daemon=false"

jobs:
  desktop-build-windows:
    name: Build Desktop App (Windows)
    runs-on: windows-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      # 1. 【降维打击】只编译全独立胖 Jar，完全绕开 packageExe 的 WiX 地雷
      - name: Build Desktop UberJar
        run: |
          ./gradlew :desktopApp:packageUberJar --no-daemon --stacktrace
        shell: bash

      # 2. 用快捷轻量工具把 JAR 直接套壳成真正的 Windows EXE，不需要任何恶心的安装包环境
      - name: Convert JAR to EXE
        shell: pwsh
        run: |
          # 下载轻量级开源 Jar 转 Exe 工具
          Invoke-WebRequest -Uri "https://github.com/vtotiger/jexe/releases/download/v1.0.0/jexe.exe" -OutFile "jexe.exe"
          
          # 寻找编译出来的 jar 包路径
          $jarFile = Get-ChildItem -Path "desktopApp/build/compose/jars/" -Filter "*.jar" | Select-Object -First 1
          
          if ($jarFile) {
              echo "Found JAR: $($jarFile.FullName)"
              # 直接融合成单文件绿色版 EXE
              ./jexe.exe -jar $jarFile.FullName -output "CineWave.exe"
              echo "Successfully generated CineWave.exe"
          } else {
              throw "Could not find built JAR file!"
          }

      # 3. 上传这纯净的、没有 WiX 污染的单文件 EXE
      - name: Upload Desktop EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-exe
          path: CineWave.exe
          if-no-files-found: error
          retention-days: 7

      # 4. 发布 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "CineWave v${{ github.run_number }}"
          body: |
            ## CineWave Desktop App (Windows 绿色版)
            
            - 说明: 无需安装，下载后双击即可直接运行！
            - 构建详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: CineWave.exe
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
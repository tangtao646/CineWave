name: Desktop Build (Windows)

on:
  workflow_dispatch:
  workflow_call:

env:
  GRADLE_OPTS: "-Xmx4096M -Dorg.gradle.daemon=false"

jobs:
  desktop-build-windows:
    name: Build Desktop App (Windows)
    runs-on: windows-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      # 【核心修正】改打更为稳健、环境天然支持的 .msi 安装包
      - name: Build Desktop App (Windows MSI)
        run: |
          ./gradlew :desktopApp:packageMsi --no-daemon --stacktrace 2>&1
        shell: bash

      # 冒烟测试与日志捕获：无论成功失败，都会帮你扫描并就地打印可能存在的底层错误日志
      - name: Capture all build logs
        if: always()
        shell: bash
        run: |
          echo "=== Checking jpackage logs directory ==="
          if [ -d "desktopApp/build/compose/logs/packageMsi" ]; then
             ls -la desktopApp/build/compose/logs/packageMsi/
          
             JPACKAGE_ERR=$(find desktopApp/build/compose/logs/packageMsi -name "jpackage*-err.txt" 2>/dev/null | head -1)
             if [ -n "$JPACKAGE_ERR" ]; then
                echo "------------------ START OF JPACKAGE ERROR ------------------"
                cat "$JPACKAGE_ERR"
                echo "------------------- END OF JPACKAGE ERROR -------------------"
             fi
          else
             echo "No specialized packageMsi log directory found."
          fi

      # 只有完全打包成功时，才执行产物上传
      - name: Upload Desktop MSI Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-msi
          path: desktopApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error
          retention-days: 7

      # 只有完全成功时才发布 GitHub Release
      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "CineWave v${{ github.run_number }}"
          body: |
            ## CineWave Desktop App (Windows MSI)
            
            - 构建详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - 代码提交: ${{ github.sha }}
          files: desktopApp/build/compose/binaries/main/msi/*.msi
          generate_release_notes: true
          make_latest: true
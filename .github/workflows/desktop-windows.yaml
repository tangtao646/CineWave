name: Desktop Build (Windows)

on:
  workflow_dispatch:
  workflow_call:

env:
  GRADLE_OPTS: "-Xmx4096M -Dorg.gradle.daemon=false"

jobs:
  desktop-build-windows:
    name: Build Desktop App (Windows)
    runs-on: windows-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Build Desktop App (Windows EXE)
        run: |
          ./gradlew :desktopApp:packageExe --no-daemon --stacktrace 2>&1
        shell: bash
        continue-on-error: true

      - name: Capture jpackage error logs
        if: always()
        shell: bash
        run: |
          echo "=== jpackage stdout ==="
          cat desktopApp/build/compose/logs/packageExe/jpackage-*-out.txt 2>/dev/null || echo "No stdout log"
          echo ""
          echo "=== jpackage stderr ==="
          cat desktopApp/build/compose/logs/packageExe/jpackage-*-err.txt 2>/dev/null || echo "No stderr log"
          echo ""
          echo "=== jpackage args ==="
          cat desktopApp/build/compose/tmp/packageExe.args.txt 2>/dev/null || echo "No args file"
          echo ""
          echo "=== Build output dirs ==="
          find desktopApp/build/compose/binaries -type d 2>/dev/null | head -20

      - name: Upload Desktop EXE Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-exe
          path: desktopApp/build/compose/binaries/main/exe/*.exe
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "CineWave v${{ github.run_number }}"
          body: |
            ## CineWave Desktop App (Windows)
            
            - 构建详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - 代码提交: ${{ github.sha }}
          files: desktopApp/build/compose/binaries/main/exe/*.exe
          generate_release_notes: true
          make_latest: true

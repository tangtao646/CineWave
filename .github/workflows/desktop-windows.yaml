name: Desktop Build (Windows)

on:
  workflow_dispatch:
  workflow_call:

env:
  GRADLE_OPTS: "-Xmx4096M -Dorg.gradle.daemon=false"

jobs:
  desktop-build-windows:
    name: Build Desktop App (Windows)
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject db.json from GitHub Secrets
        shell: bash
        run: |
          echo "🔐 Decoding DB_JSON secret into composeResources/files/db.json..."
          echo "${{ secrets.DB_JSON }}" | base64 -d > shared/src/commonMain/composeResources/files/db.json
          echo "✅ db.json injected successfully ($(wc -c < shared/src/commonMain/composeResources/files/db.json) bytes)"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      # 1. 确保 Inno Setup 6 编译器绝对可用
      - name: Install Inno Setup
        run: |
          winget install JrSoftware.InnoSetup --silent --accept-source-agreements --accept-package-agreements
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH
        shell: pwsh

      # 2. 编译绿色版可执行文件目录
      - name: Build Desktop Distributable
        run: |
          ./gradlew :desktopApp:createDistributable --no-daemon --stacktrace
        shell: bash

      # 3. 【精准追踪】全自动化地毯式搜索 CineWave.exe 所在的真实绿色版根目录
      - name: Generate Inno Setup Script
        shell: pwsh
        run: |
          Write-Host "Searching for CineWave.exe inside build directory..."
          
          # 地毯式扫描整个 binaries 目录，精准定位真实的 CineWave.exe 文件
          $exeFile = Get-ChildItem -Path "desktopApp/build/compose/binaries" -Filter "CineWave.exe" -Recurse | Select-Object -First 1
          
          if (-not $exeFile) {
              # 降级兜底：找任何可能生成的 .exe 启动器
              $exeFile = Get-ChildItem -Path "desktopApp/build/compose/binaries" -Filter "*.exe" -Recurse | Select-Object -First 1
          }

          if ($exeFile) {
              # 获取这个 .exe 所在的真实父级目录，并转换为 Windows 绝对路径
              $fullSourcePath = [System.IO.Path]::GetFullPath($exeFile.DirectoryName)
              $realExeName = $exeFile.Name
              Write-Host "🎯 成功抓取真实生产环境路径: $fullSourcePath"
              Write-Host "🎯 成功抓取启动器文件名: $realExeName"
          } else {
              throw "❌ 严重错误: 无法在 Gradle 输出目录中找到任何生成的可执行文件！请确认 createDistributable 是否成功。"
          }
          
          # 动态写入适配真实路径的 ISS 配置文件
          $issContent = @"
          [Setup]
          AppName=CineWave
          AppVersion=1.0.0
          DefaultDirName={autopf}\CineWave
          DefaultGroupName=CineWave
          OutputDir=.
          OutputBaseFilename=CineWave_Setup
          Compression=lzma2/max
          SolidCompression=yes
          DisableDirPage=no
          DisableProgramGroupPage=yes
          PrivilegesRequired=admin

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

          [Files]
          Source: "${fullSourcePath}\${realExeName}"; DestDir: "{app}"; Flags: ignoreversion
          Source: "${fullSourcePath}\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\CineWave"; Filename: "{app}\${realExeName}"
          Name: "{autodesktop}\CineWave"; Filename: "{app}\${realExeName}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\${realExeName}"; Description: "{cm:LaunchProgram,CineWave}"; Flags: nowait postinstall skipifsilent
          "@
          
          [System.IO.File]::WriteAllText("setup.iss", $issContent, [System.Text.Encoding]::UTF8)
          Write-Host "setup.iss has been generated flawlessly."

      # 4. 直接呼叫 Inno Setup 编译器一键封装
      - name: Compile Installer EXE
        run: |
          iscc.exe setup.iss
        shell: cmd

      # 5. 上传最终的标准单文件独立安装包
      - name: Upload Desktop EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-installer
          path: CineWave_Setup.exe
          if-no-files-found: error
          retention-days: 7

      # 6. 发布 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "CineWave v${{ github.run_number }}"
          body: |
            ## CineWave Desktop App (Windows 标准安装版)
            
            - 说明: 这是一个标准的单文件 `.exe` 安装包。
            - 使用方法: 下载 `CineWave_Setup.exe`，双击运行即可。
          files: CineWave_Setup.exe
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Desktop Build (Windows)

on:
  workflow_dispatch:
  workflow_call:

env:
  GRADLE_OPTS: "-Xmx4096M -Dorg.gradle.daemon=false"

jobs:
  desktop-build-windows:
    name: Build Desktop App (Windows)
    runs-on: windows-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      # 1. 用 PowerShell 安全安装 Inno Setup 并注入环境变量
      - name: Install Inno Setup (Required for jpackage .exe)
        run: |
          winget install JrSoftware.InnoSetup --silent --accept-source-agreements --accept-package-agreements
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH
        shell: pwsh

      # 2. 真正执行打包（直接在这里合入救命的区域和编码参数，一次定乾坤）
      - name: Build Desktop App (Windows EXE)
        run: |
          ./gradlew :desktopApp:packageExe \
            -Dfile.encoding=UTF-8 \
            -Duser.language=en \
            -Duser.country=US \
            --no-daemon --stacktrace 2>&1
        shell: bash

      # 3. 错误捕获：无论成功失败 (always)，如果挂了就只负责当场 cat 现场日志，绝不重新打包
      - name: Capture all build logs
        if: always()
        shell: bash
        run: |
          echo "=== Checking jpackage logs directory ==="
          if [ -d "desktopApp/build/compose/logs/packageExe" ]; then
             ls -la desktopApp/build/compose/logs/packageExe/
          
             echo "------------------ START OF JPACKAGE ERROR LOG ------------------"
             # 使用通配符打印可能存在的 err.txt，省去手写时间戳的麻烦
             cat desktopApp/build/compose/logs/packageExe/*-err.txt 2>/dev/null || echo "No err.txt found."
             echo "------------------- END OF JPACKAGE ERROR LOG -------------------"
          else
             echo "No specialized packageExe log directory found. The error might be a general Gradle compilation issue."
          fi

      # 4. 只有编译成功，才上传 .exe 产物
      - name: Upload Desktop EXE Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-exe
          path: desktopApp/build/compose/binaries/main/exe/*.exe
          if-no-files-found: error
          retention-days: 7

      # 5. 只有编译成功，才自动发布 release 并挂载附件
      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "CineWave v${{ github.run_number }}"
          body: |
            ## CineWave Desktop App (Windows EXE)
            
            - 构建详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - 代码提交: ${{ github.sha }}
          files: desktopApp/build/compose/binaries/main/exe/*.exe
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
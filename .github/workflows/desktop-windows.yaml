name: Desktop Build (Windows)

on:
  workflow_dispatch:
  workflow_call:

env:
  GRADLE_OPTS: "-Xmx4096M -Dorg.gradle.daemon=false"

jobs:
  desktop-build-windows:
    name: Build Desktop App (Windows)
    runs-on: windows-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      # 1. 【终极降维打击】只生成绿色版可执行文件目录，不走 WiX 安装包，没有任何环境和网络依赖
      - name: Build Desktop Distributable
        run: |
          ./gradlew :desktopApp:createDistributable --no-daemon --stacktrace
        shell: bash

      # 2. 用 Windows 自带的 PowerShell 将绿色的程序文件夹直接压缩为标准的 .zip 包
      - name: Compress Directory to Zip
        shell: pwsh
        run: |
          # 定义可能存在的两条官方输出路径（兼容不同老旧版本的 Compose 插件）
          $path1 = "desktopApp/build/compose/binaries/main/app"
          $path2 = "desktopApp/build/compose/binaries/main/suggested-name"
          
          if (Test-Path $path1) {
              $sourcePath = $path1
          } elseif (Test-Path $path2) {
              $sourcePath = $path2
          } else {
              # 兜底：自动寻找目录下含有 .exe 文件的那个应用根目录
              $exeFile = Get-ChildItem -Path "desktopApp/build/compose/binaries" -Filter "*.exe" -Recurse | Select-Object -First 1
              if ($exeFile) { $sourcePath = $exeFile.DirectoryName }
          }

          if ($sourcePath) {
              Write-Host "Found production directory at: $sourcePath"
              # 压缩为标准的绿色版压缩包
              Compress-Archive -Path "$sourcePath\*" -DestinationPath "CineWave-Windows-Portable.zip" -Force
              Write-Host "Successfully generated CineWave-Windows-Portable.zip"
          } else {
              throw "Could not find built app directory! Please check Gradle task outputs."
          }

      # 3. 上传这份完全由官方安全生成的绿色版 Zip
      - name: Upload Desktop Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-zip
          path: CineWave-Windows-Portable.zip
          if-no-files-found: error
          retention-days: 7

      # 4. 自动发布 GitHub Release 挂载 Zip
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "CineWave v${{ github.run_number }}"
          body: |
            ## CineWave Desktop App (Windows 绿色免安装版)
            
            - 说明: 微软打包工具链存在多语言已知漏洞。为保证稳定性，此版本采用标准的 Portable 绿色版。
            - 使用方法: 下载后解压 `.zip` 压缩包，双击里面的 `CineWave.exe` 即可直接运行。
            - 构建详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: CineWave-Windows-Portable.zip
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: CineWave CI/CD (All Platforms)

on:
  workflow_dispatch:
    inputs:
      build-macos:
        description: 'Build macOS Desktop DMG'
        type: boolean
        default: true
      build-windows:
        description: 'Build Windows Desktop EXE'
        type: boolean
        default: false
      build-android:
        description: 'Build Android APK + AAB'
        type: boolean
        default: false

jobs:
  # ============================================================
  # 一键调度器：通过 workflow_call 复用各平台独立的 workflow
  # ============================================================
  macos:
    name: macOS Desktop
    if: ${{ inputs.build-macos }}
    uses: ./.github/workflows/desktop-macos.yaml
    secrets: inherit

  windows:
    name: Windows Desktop
    if: ${{ inputs.build-windows }}
    uses: ./.github/workflows/desktop-windows.yaml
    secrets: inherit

  android:
    name: Android
    if: ${{ inputs.build-android }}
    uses: ./.github/workflows/android.yaml
    secrets: inherit

  # ============================================================
  # Summary
  # ============================================================
  summary:
    name: Build Summary
    needs:
      - android-build
      - desktop-build-macos
      - desktop-build-linux
      # - desktop-build-windows
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Print Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Android APK | ${{ needs.android-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Desktop (macOS) | ${{ needs.desktop-build-macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Desktop (Linux) | ${{ needs.desktop-build-linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Desktop (Windows) | ${{ needs.desktop-build-windows.result }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # Release (仅手动触发且构建成功时)
  # ============================================================
  release:
    name: Create Release
    needs:
      - android-build
      - desktop-build-macos
      - desktop-build-linux
      # - desktop-build-windows
    if: github.event_name == 'workflow_dispatch' && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ github.event.inputs.build_type || 'debug' }}
          path: release-assets

      - name: Download Desktop DMG
        uses: actions/download-artifact@v4
        with:
          name: desktop-dmg
          path: release-assets

      - name: Download Desktop DEB
        uses: actions/download-artifact@v4
        with:
          name: desktop-deb
          path: release-assets

      # - name: Download Desktop MSI
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: desktop-msi
      #     path: release-assets

      - name: List downloaded files
        run: |
          ls -la release-assets/

      - name: Generate release tag
        id: tag
        run: |
          echo "release_tag=v$(date +'%Y%m%d.%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Build ${{ steps.tag.outputs.release_tag }}
          body: |
            ## CineWave Build ${{ steps.tag.outputs.release_tag }}

            ### 构建信息
            - 触发方式: ${{ github.event_name }}
            - 分支: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}

            ### 包含的产物
            - Android APK
            - Desktop DMG (macOS)
            - Desktop DEB (Linux)
            # - Desktop MSI (Windows)
          files: release-assets/*
          draft: false
          prerelease: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CineWave CI/CD

on:
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Xmx4096M -Dorg.gradle.daemon=false"

jobs:
  desktop-build-macos:
    name: Build Desktop App (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Install VLC (for Desktop video player)
        run: brew install vlc

      - name: Build Desktop App (macOS)
        run: |
          ./gradlew :desktopApp:packageDmg --no-daemon

      - name: Mount DMG and run app to verify it starts
        run: |
          DMG_FILE=$(ls desktopApp/build/compose/binaries/main/dmg/*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG_FILE" ]; then
            echo "No DMG file found!"
            exit 1
          fi
          echo "Found DMG: $DMG_FILE"
          
          # 挂载 DMG
          MOUNT_POINT=$(hdiutil attach "$DMG_FILE" -nobrowse | tail -1 | awk '{print $3}')
          echo "Mounted at: $MOUNT_POINT"
          
          # 查找 .app 文件
          APP_PATH=$(find "$MOUNT_POINT" -name "*.app" -maxdepth 2 | head -1)
          echo "App path: $APP_PATH"
          
          if [ -n "$APP_PATH" ]; then
            # 启动 app
            echo "=== Launching app ==="
            open "$APP_PATH"
            sleep 8
            
            # 检查进程是否存活
            if pgrep -f "CineWave" > /dev/null 2>&1; then
              echo "✅ App started successfully (process running)"
            else
              echo "❌ App process exited prematurely"
            fi
            
            # 检查崩溃日志
            echo "=== Crash logs ==="
            CRASH_LOG=$(ls -t ~/Library/Logs/DiagnosticReports/*.crash 2>/dev/null | head -3)
            if [ -n "$CRASH_LOG" ]; then
              for log in $CRASH_LOG; do
                echo "--- $log ---"
                cat "$log"
              done
            else
              echo "No crash logs found ✅"
            fi
            
            # 卸载 DMG
            hdiutil detach "$MOUNT_POINT" -quiet
            echo "✅ DMG verification complete"
          else
            echo "No .app found in DMG"
            hdiutil detach "$MOUNT_POINT" -quiet
            exit 1
          fi

      - name: Upload Desktop DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dmg
          path: desktopApp/build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "CineWave v${{ github.run_number }}"
          body: |
            ## CineWave Desktop App
            
            - 构建时间: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - 提交: ${{ github.sha }}
          files: desktopApp/build/compose/binaries/main/dmg/*.dmg
          generate_release_notes: true
          make_latest: true

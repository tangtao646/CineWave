name: CineWave CI/CD

on:
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Xmx4096M -Dorg.gradle.daemon=false"

jobs:
  desktop-build-macos:
    name: Build Desktop App (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Install VLC (for Desktop video player)
        run: brew install vlc

      - name: Build Desktop App (macOS)
        run: |
          ./gradlew :desktopApp:packageDmg --no-daemon

      - name: Mount DMG and run app to capture startup errors
        run: |
          DMG_FILE=$(ls desktopApp/build/compose/binaries/main/dmg/*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG_FILE" ]; then
            echo "No DMG file found!"
            exit 1
          fi
          echo "Found DMG: $DMG_FILE"
          
          # 挂载 DMG
          MOUNT_POINT=$(hdiutil attach "$DMG_FILE" -nobrowse | tail -1 | awk '{print $3}')
          echo "Mounted at: $MOUNT_POINT"
          
          # 查找 .app 文件
          APP_PATH=$(find "$MOUNT_POINT" -name "*.app" -maxdepth 2 | head -1)
          echo "App path: $APP_PATH"
          
          if [ -n "$APP_PATH" ]; then
            # 尝试运行 app 并捕获错误输出
            echo "=== Attempting to launch app ==="
            # 使用 open 命令启动，等待几秒后检查崩溃日志
            open "$APP_PATH"
            sleep 10
            
            # 检查崩溃日志
            echo "=== Crash logs ==="
            CRASH_LOG=$(ls -t ~/Library/Logs/DiagnosticReports/*.crash 2>/dev/null | head -3)
            if [ -n "$CRASH_LOG" ]; then
              for log in $CRASH_LOG; do
                echo "--- $log ---"
                cat "$log"
              done
            else
              echo "No crash logs found"
            fi
            
            # 检查系统日志中关于该 app 的错误
            echo "=== System log entries for CineWave ==="
            log show --predicate 'process == "CineWave" OR message contains "CineWave"' --last 30s --info --debug 2>/dev/null | tail -50
            
            # 卸载 DMG
            hdiutil detach "$MOUNT_POINT" -quiet
          else
            echo "No .app found in DMG"
            hdiutil detach "$MOUNT_POINT" -quiet
            exit 1
          fi

      - name: Upload Desktop DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dmg
          path: desktopApp/build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7
